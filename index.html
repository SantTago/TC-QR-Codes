<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TC Gerador">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/Ps7xfqnD/TC.png">
    
    <title>TC QR-Codes | Pix Permanente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-green: #238636;
            --primary-green-light: #3fb950;
            --text-color: #e6edf3;
            --text-muted: #8b949e;
            --keypad-bg: #21262d;
            --overlay-bg: rgba(0, 0, 0, 0.98);
        }

        /* Bloqueio Total de Rolagem e Ajuste de Altura Dinâmica (PWA) */
        html, body {
            height: 100%; /* Fallback */
            height: -webkit-fill-available; /* Super-importante para iOS Safari */
            height: 100dvh; /* Altura dinâmica moderna */
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Remove rolagem do corpo */
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            position: fixed; /* Fixa o corpo para evitar puxar */
            
            /* safe-area-inset para iPhone X+ */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            /* O segredo para não cortar: flex container ocupando toda a altura disponível */
            height: 100dvh;
            height: -webkit-fill-available;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            /* Distribuição vertical flexível */
            justify-content: flex-start; 
            padding: 10px 15px; /* Padding reduzido */
        }

        /* Top Bar fixada no topo */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px; /* Altura reduzida */
            flex: 0 0 auto; /* Não cresce, não encolhe */
            margin-bottom: 5px;
        }

        .logo { color: var(--primary-green-light); font-weight: bold; font-size: 1rem; }

        /* Section Recebedor centralizada e flexível */
        .header-section { 
            text-align: center; 
            flex: 0 1 auto; /* Pode encolher se necessário */
            margin-bottom: 5px;
        }

        .recebedor-badge {
            background-color: var(--primary-green);
            padding: 6px 15px; /* Padding reduzido */
            border-radius: 20px;
            font-size: 0.8rem; /* Fonte reduzida */
            display: inline-block;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Display do Valor super-flexível */
        .valor-display {
            font-size: clamp(2rem, 8vh, 3.5rem); /* Diminui agressivamente em telas pequenas */
            font-weight: bold;
            margin: 5px 0;
            letter-spacing: -1px;
            word-break: break-all;
            flex: 0 1 auto; /* Pode encolher */
        }

        /* Teclado Inteligente e Super-Flexível */
        .teclado {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px; /* Gap reduzido */
            flex: 1 1 auto; /* Ocupa o espaço restante e PODE ENCOLHER */
            align-content: center; /* Centraliza as teclas verticalmente no espaço delas */
            margin-bottom: 10px;
            min-height: 0; /* Permite que o grid encolha abaixo de seu conteúdo */
        }

        .tecla {
            background-color: var(--keypad-bg);
            border: none;
            color: white;
            font-size: clamp(1rem, 4vh, 1.6rem); /* Fonte responsiva */
            border-radius: 12px; /* Raio reduzido */
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            /* aspect-ratio removido para permitir achatamento em telas curtas */
            height: 100%; /* Preenche a célula do grid */
            min-height: 40px; /* Altura mínima para garantir tocabilidade */
            transition: background 0.1s;
        }

        .tecla:active { 
            background-color: #30363d; 
        }

        /* Botão Gerar fixado no rodapé com padding de segurança */
        .btn-gerar {
            background-color: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            /* Padding responsivo com segurança para a borda inferior */
            padding: clamp(12px, 2.5vh, 20px); 
            padding-bottom: calc(clamp(12px, 2.5vh, 20px) + env(safe-area-inset-bottom));
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 0 0 auto; /* Não encolhe, mantém seu tamanho */
            margin-top: auto; /* Empurra para o final do flex container */
        }

        /* REGRAS ESPECÍFICAS PARA TELAS MUITO CURTAS (como iPhone 6 Safari) */
        @media (max-height: 600px) {
            .main-container { padding: 5px 10px; }
            .top-bar { height: 35px; margin-bottom: 2px; }
            .logo { font-size: 0.9rem; }
            .header-section { margin-bottom: 2px; }
            .recebedor-badge { padding: 4px 10px; font-size: 0.7rem; }
            .valor-display { font-size: 1.8rem; margin: 2px 0; }
            .teclado { gap: 5px; margin-bottom: 5px; }
            .tecla { border-radius: 8px; font-size: 1rem; min-height: 35px; }
            .btn-gerar { padding: 10px; border-radius: 12px; font-size: 0.9rem; }
        }

        /* Estilos dos Botões Secundários nos Modais */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .modal-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 350px;
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid #30363d;
            max-height: 90vh;
            overflow-y: auto;
        }

        input, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin: 6px 0;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        textarea { resize: none; height: 60px; }

        #qrcode canvas, #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 12px;
            max-width: 150px;
            height: auto;
        }

        .copy-link {
            background: #0d1117;
            padding: 6px;
            font-size: 0.5rem;
            word-break: break-all;
            border-radius: 6px;
            margin-top: 8px;
            border: 1px dashed var(--primary-green);
            color: var(--text-muted);
        }
    </style>
</head>
<body onload="carregarConfig()">

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🟢 TC QR-Codes</div>
            <div style="font-size: 1rem; cursor: pointer; padding: 5px;" onclick="openModal('modal-config')">⚙️</div>
        </div>

        <div class="header-section">
            <div style="color: var(--text-muted); font-size: 0.6rem; letter-spacing: 1.5px; font-weight: bold;">RECEBEDOR</div>
            <div class="recebedor-badge" id="main-nome" onclick="openModal('modal-config')">Cadastrar Chave Pix</div>
            <div class="valor-display" id="display">R$ 0,00</div>
        </div>

        <div class="teclado">
            <button class="tecla" onclick="addNum(1)">1</button>
            <button class="tecla" onclick="addNum(2)">2</button>
            <button class="tecla" onclick="addNum(3)">3</button>
            <button class="tecla" onclick="addNum(4)">4</button>
            <button class="tecla" onclick="addNum(5)">5</button>
            <button class="tecla" onclick="addNum(6)">6</button>
            <button class="tecla" onclick="addNum(7)">7</button>
            <button class="tecla" onclick="addNum(8)">8</button>
            <button class="tecla" onclick="addNum(9)">9</button>
            <button class="tecla" style="background:transparent; pointer-events:none"></button>
            <button class="tecla" onclick="addNum(0)">0</button>
            <button class="tecla" onclick="delNum()" style="color: #f85149">⌫</button>
        </div>

        <button class="btn-gerar" onclick="gerarTudo()">Gerar QR Code PIX</button>
    </div>

    <div class="modal" id="modal-config">
        <div class="modal-card">
            <h3 style="margin-top:0; font-size: 1.1rem;">Configurar Dados</h3>
            <input type="text" id="in-nome" placeholder="Nome Completo">
            <input type="text" id="in-chave" placeholder="Chave PIX (CPF, Celular, etc)">
            <textarea id="in-msg" placeholder="Mensagem de agradecimento WhatsApp..."></textarea>
            <button class="btn-gerar" style="padding: 12px; margin-top: 10px;" onclick="salvarConfig()">Salvar Dados</button>
            <p onclick="closeModal('modal-config')" style="cursor:pointer; color:var(--text-muted); margin-top:12px; font-size: 0.8rem; padding: 5px;">Voltar</p>
        </div>
    </div>

    <div class="modal" id="modal-qr">
        <div class="modal-card">
            <div id="qrcode"></div>
            <div style="font-size: 1.1rem; font-weight:bold; color:var(--primary-green-light); margin: 6px 0;" id="qr-val"></div>
            <div class="copy-link" id="pix-link"></div>
            
            <button class="btn-whatsapp" style="padding: 12px; font-size: 0.9rem;" onclick="compartilharZap()">
                <span>Compartilhar no WhatsApp</span>
            </button>

            <button class="btn-gerar" style="background-color: var(--keypad-bg); margin-top: 8px; padding: 10px; font-size: 0.9rem;" onclick="closeModal('modal-qr')">Fechar</button>
        </div>
    </div>

    <script>
        // Lógica mantida conforme versão permanente v5
        let valorCents = 0;
        let config = { nome: "", chave: "", cidade: "SAO PAULO", mensagem: "" };
        let currentPayload = "";

        function carregarConfig() {
            const salvo = localStorage.getItem('tc_pix_app_final_v2');
            if(salvo) {
                config = JSON.parse(salvo);
                if(config.nome) {
                    document.getElementById('main-nome').innerText = config.nome;
                    document.getElementById('in-nome').value = config.nome;
                    document.getElementById('in-chave').value = config.chave;
                    document.getElementById('in-msg').value = config.mensagem || "";
                }
            }
        }

        function salvarConfig() {
            const nome = document.getElementById('in-nome').value.toUpperCase().trim();
            const chave = document.getElementById('in-chave').value.trim();
            const msg = document.getElementById('in-msg').value.trim();

            if(!nome || !chave) return alert("Preencha Nome e Chave!");

            config.nome = nome;
            config.chave = chave;
            config.mensagem = msg;

            localStorage.setItem('tc_pix_app_final_v2', JSON.stringify(config));
            
            document.getElementById('main-nome').innerText = nome;
            closeModal('modal-config');
        }

        function addNum(n) {
            if (valorCents.toString().length < 9) {
                valorCents = parseInt(valorCents.toString() + n);
                updateDisplay();
            }
        }

        function delNum() {
            valorCents = Math.floor(valorCents / 10) || 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').innerText = (valorCents/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function crc16(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                crc ^= str.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021;
                    else crc <<= 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function gerarTudo() {
            if(!config.chave) return openModal('modal-config');
            if(valorCents === 0) return alert("Digite um valor");
            
            const valStr = (valorCents / 100).toFixed(2);
            const f = (id, t) => id + t.length.toString().padStart(2, '0') + t;
            
            let payload = "00020126" + (22 + config.chave.length).toString().padStart(2, '0');
            payload += "0014br.gov.bcb.pix" + f("01", config.chave);
            payload += "520400005303986" + f("54", valStr) + "5802BR";
            payload += f("59", config.nome.substring(0, 25)) + f("60", config.cidade) + "62070503***6304";
            payload += crc16(payload);

            currentPayload = payload;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: payload, width: 200, height: 200 });
            
            document.getElementById('pix-link').innerText = payload;
            document.getElementById('qr-val').innerText = "R$ " + valStr.replace('.', ',');
            openModal('modal-qr');
        }

        function compartilharZap() {
            const valorFormatado = document.getElementById('qr-val').innerText;
            const msgPersonalizada = config.mensagem || "Agradeço pela preferência! ✅";
            const textoCompleto = `Olá! Segue o código PIX para o pagamento de ${valorFormatado}.\n\nCopia e Cola:\n${currentPayload}\n\n${msgPersonalizada}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(textoCompleto)}`, '_blank');
        }
    </script>
</body>
</html>
