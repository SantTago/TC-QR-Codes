<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TC QR-Codes | Gerador PIX Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-green: #238636;
            --primary-green-light: #3fb950;
            --text-color: #e6edf3;
            --text-muted: #8b949e;
            --keypad-bg: #21262d;
            --overlay-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo { color: var(--primary-green-light); font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }

        .icon-config {
            cursor: pointer;
            font-size: 1.4rem;
            color: var(--text-muted);
            transition: transform 0.2s;
        }
        .icon-config:hover { transform: rotate(45deg); }

        /* Badge Recebedor */
        .recebedor-badge {
            background-color: var(--primary-green);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .valor-display {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0 30px 0;
            letter-spacing: -1px;
        }

        /* Teclado Numérico */
        .teclado {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .tecla {
            background-color: var(--keypad-bg);
            border: none;
            color: white;
            padding: 22px;
            font-size: 1.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .tecla:active { background-color: #30363d; }

        .btn-gerar {
            background-color: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: filter 0.2s;
        }
        .btn-gerar:active { filter: brightness(1.2); }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: var(--card-bg);
            width: 85%;
            max-width: 320px;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            box-sizing: border-box;
            outline: none;
        }

        .copy-link {
            background: #0d1117;
            padding: 12px;
            font-size: 0.7rem;
            word-break: break-all;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px dashed var(--primary-green);
            color: var(--text-muted);
        }

        /* --- ANIMAÇÕES DE SUCESSO --- */
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-pop {
            animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .success-checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: var(--primary-green-light);
            fill: var(--primary-green);
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: white;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
        }

        @keyframes stroke { to { stroke-dashoffset: 0; } }

        .hint-text {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🟢 TC QR-Codes</div>
            <div class="icon-config" onclick="openModal('modal-config')">⚙️</div>
        </div>

        <div style="color: var(--text-muted); font-size: 0.8rem; letter-spacing: 1px;">RECEBEDOR</div>
        <div class="recebedor-badge" id="main-nome">Tiago Viana da Cruz</div>

        <div class="valor-display" id="display">R$ 0,00</div>

        <div class="teclado">
            <button class="tecla" onclick="addNum(1)">1</button>
            <button class="tecla" onclick="addNum(2)">2</button>
            <button class="tecla" onclick="addNum(3)">3</button>
            <button class="tecla" onclick="addNum(4)">4</button>
            <button class="tecla" onclick="addNum(5)">5</button>
            <button class="tecla" onclick="addNum(6)">6</button>
            <button class="tecla" onclick="addNum(7)">7</button>
            <button class="tecla" onclick="addNum(8)">8</button>
            <button class="tecla" onclick="addNum(9)">9</button>
            <button class="tecla" style="visibility:hidden"></button>
            <button class="tecla" onclick="addNum(0)">0</button>
            <button class="tecla" onclick="delNum()" style="color: #f85149">⌫</button>
        </div>

        <button class="btn-gerar" onclick="gerarTudo()">Gerar QR Code PIX</button>
    </div>

    <div class="modal" id="modal-config">
        <div class="modal-card">
            <h3>Configurar Dados</h3>
            <input type="text" id="in-nome" placeholder="Nome do Recebedor">
            <input type="text" id="in-chave" placeholder="Chave PIX (CPF, Email, etc)">
            <button class="btn-gerar" onclick="salvarConfig()">Salvar</button>
            <p onclick="closeModal('modal-config')" style="cursor:pointer; color:var(--text-muted); margin-top:10px;">Cancelar</p>
        </div>
    </div>

    <div class="modal" id="modal-qr">
        <div class="modal-card">
            <div id="qrcode" style="background:white; padding:12px; display:inline-block; border-radius:12px; margin-bottom: 10px;"></div>
            <div style="font-size: 1.2rem; font-weight:bold; color:var(--primary-green-light);" id="qr-val"></div>
            <div class="copy-link" id="pix-link"></div>
            <button class="btn-gerar" style="margin-top:20px;" onclick="confirmar()">Confirmar Recebimento</button>
            <p onclick="closeModal('modal-qr')" style="cursor:pointer; color:var(--text-muted); margin-top:15px;">Voltar</p>
        </div>
    </div>

    <div class="modal" id="modal-sucesso" onclick="reset()">
        <div class="modal-card animate-pop" style="background: transparent; box-shadow: none;">
            <svg class="success-checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" stroke-width="5" stroke-linecap="round"/>
            </svg>
            
            <h2 style="margin: 10px 0 5px 0;">Pix Confirmado!</h2>
            <p style="color: var(--primary-green-light); margin: 0;">Pagamento recebido com sucesso</p>
            
            <div class="hint-text">Toque para fechar</div>
        </div>
    </div>

    <script>
        let valorCents = 0;
        let config = { nome: "TIAGO VIANA DA CRUZ", chave: "suachaveaqui", cidade: "SAO PAULO" };

        function addNum(n) {
            if (valorCents.toString().length < 9) {
                valorCents = parseInt(valorCents.toString() + n);
                updateDisplay();
            }
        }

        function delNum() {
            valorCents = Math.floor(valorCents / 10);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').innerText = (valorCents/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function salvarConfig() {
            const novoNome = document.getElementById('in-nome').value.toUpperCase();
            const novaChave = document.getElementById('in-chave').value;
            if(novoNome) config.nome = novoNome;
            if(novaChave) config.chave = novaChave;
            
            document.getElementById('main-nome').innerText = config.nome;
            closeModal('modal-config');
        }

        function crc16(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                crc ^= str.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021;
                    else crc <<= 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function gerarTudo() {
            if(valorCents === 0) return alert("Digite um valor");
            
            const valStr = (valorCents / 100).toFixed(2);
            const f = (id, t) => id + t.length.toString().padStart(2, '0') + t;
            
            // Montagem do Payload PIX
            let payload = "00020126" + (22 + config.chave.length).toString().padStart(2, '0');
            payload += "0014br.gov.bcb.pix" + f("01", config.chave);
            payload += "520400005303986" + f("54", valStr) + "5802BR";
            payload += f("59", config.nome.substring(0, 25)) + f("60", config.cidade) + "62070503***6304";
            payload += crc16(payload);

            // Gerar QR
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: payload, width: 180, height: 180, correctLevel : QRCode.CorrectLevel.M });
            
            document.getElementById('pix-link').innerText = payload;
            document.getElementById('qr-val').innerText = "R$ " + valStr.replace('.', ',');
            openModal('modal-qr');
        }

        function confirmar() {
            closeModal('modal-qr');
            openModal('modal-sucesso');
        }

        function reset() {
            valorCents = 0;
            updateDisplay();
            closeModal('modal-sucesso');
        }
    </script>
</body>
</html>
