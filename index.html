<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TC Gerador">
    
    <link rel="apple-touch-icon" href="https://i.ibb.co/Ps7xfqnD/TC.png">
    
    <title>TC QR-Codes | Pix Permanente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-green: #238636;
            --primary-green-light: #3fb950;
            --text-color: #e6edf3;
            --text-muted: #8b949e;
            --keypad-bg: #21262d;
            --overlay-bg: rgba(0, 0, 0, 0.98);
        }

        /* Bloqueio Total de Rolagem e Ajuste de Altura Dinâmica (PWA) */
        html, body {
            height: 100%; 
            height: -webkit-fill-available; 
            height: 100dvh; 
            width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            position: fixed; 
            
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            height: 100dvh;
            height: -webkit-fill-available;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            padding: 10px 15px; 
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px; 
            flex: 0 0 auto; 
            margin-bottom: 5px;
        }

        .logo { color: var(--primary-green-light); font-weight: bold; font-size: 1.1rem; }

        .header-section { 
            text-align: center; 
            flex: 0 1 auto; 
            margin-bottom: 5px;
        }

        .recebedor-badge {
            background-color: var(--primary-green);
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            display: inline-block;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .valor-display {
            font-size: clamp(2.5rem, 11vh, 4rem); /* Responsivo */
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: -1px;
            word-break: break-all;
            flex: 0 1 auto; 
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            flex: 1 1 auto; /* Flexível */
            align-content: center; 
            margin-bottom: 10px;
            min-height: 0; 
        }

        .tecla {
            background-color: var(--keypad-bg);
            border: none;
            color: white;
            font-size: clamp(1.2rem, 5vh, 1.8rem); /* Responsivo */
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%; 
            min-height: 45px; 
            transition: background 0.1s;
        }

        .tecla:active { 
            background-color: #30363d; 
        }

        /* BOTÃO COMO TAVA: Botão Gerar Principal */
        .btn-gerar {
            background-color: var(--primary-green);
            color: white;
            border: none;
            width: 100%;
            /* Padding e Arredondamento anteriores */
            padding: clamp(15px, 3vh, 25px); 
            padding-bottom: calc(clamp(15px, 3vh, 25px) + env(safe-area-inset-bottom));
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            flex: 0 0 auto; 
            margin-top: auto; 
        }

        /* REGRAS ESPECÍFICAS PARA TELAS CURTAS */
        @media (max-height: 600px) {
            .valor-display { font-size: 2.2rem; }
            .teclado { gap: 8px; }
            .tecla { min-height: 40px; }
            /* Botão encolhe levemente, mas mantém o estilo */
            .btn-gerar { padding: 15px; font-size: 1rem; }
        }

        /* Estilos dos Modais e Botões Secundários */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            border: none;
            width: 100%;
            /* Padding e Arredondamento anteriores */
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            padding: 20px;
        }

        .modal-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 350px;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #30363d;
            max-height: 90vh;
            overflow-y: auto;
        }

        input, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 8px 0;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        textarea { resize: none; height: 80px; }

        #qrcode canvas, #qrcode img {
            margin: 0 auto;
            border: 10px solid white;
            border-radius: 15px;
            max-width: 180px;
            height: auto;
        }

        .copy-link {
            background: #0d1117;
            padding: 8px;
            font-size: 0.55rem;
            word-break: break-all;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px dashed var(--primary-green);
            color: var(--text-muted);
        }
    </style>
</head>
<body onload="carregarConfig()">

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🟢 TC QR-Codes</div>
            <div style="font-size: 1.2rem; cursor: pointer; padding: 5px;" onclick="openModal('modal-config')">⚙️</div>
        </div>

        <div class="header-section">
            <div style="color: var(--text-muted); font-size: 0.65rem; letter-spacing: 2px; font-weight: bold; margin-bottom: 5px;">RECEBEDOR</div>
            <div class="recebedor-badge" id="main-nome" onclick="openModal('modal-config')">Cadastrar Chave Pix</div>
            <div class="valor-display" id="display">R$ 0,00</div>
        </div>

        <div class="teclado">
            <button class="tecla" onclick="addNum(1)">1</button>
            <button class="tecla" onclick="addNum(2)">2</button>
            <button class="tecla" onclick="addNum(3)">3</button>
            <button class="tecla" onclick="addNum(4)">4</button>
            <button class="tecla" onclick="addNum(5)">5</button>
            <button class="tecla" onclick="addNum(6)">6</button>
            <button class="tecla" onclick="addNum(7)">7</button>
            <button class="tecla" onclick="addNum(8)">8</button>
            <button class="tecla" onclick="addNum(9)">9</button>
            <button class="tecla" style="background:transparent; pointer-events:none"></button>
            <button class="tecla" onclick="addNum(0)">0</button>
            <button class="tecla" onclick="delNum()" style="color: #f85149">⌫</button>
        </div>

        <button class="btn-gerar" onclick="gerarTudo()">Gerar QR Code PIX</button>
    </div>

    <div class="modal" id="modal-config">
        <div class="modal-card">
            <h3 style="margin-top:0">Configurar Dados</h3>
            <input type="text" id="in-nome" placeholder="Nome Completo">
            <input type="text" id="in-chave" placeholder="Chave PIX (CPF, Celular, etc)">
            <textarea id="in-msg" placeholder="Mensagem de agradecimento WhatsApp..."></textarea>
            <button class="btn-gerar" style="padding: 15px; margin-top: 10px;" onclick="salvarConfig()">Salvar Dados</button>
            <p onclick="closeModal('modal-config')" style="cursor:pointer; color:var(--text-muted); margin-top:15px; padding: 5px;">Voltar</p>
        </div>
    </div>

    <div class="modal" id="modal-qr">
        <div class="modal-card">
            <div id="qrcode"></div>
            <div style="font-size: 1.2rem; font-weight:bold; color:var(--primary-green-light); margin: 8px 0;" id="qr-val"></div>
            <div class="copy-link" id="pix-link"></div>
            
            <button class="btn-whatsapp" style="padding: 15px; font-size: 1rem;" onclick="compartilharZap()">
                <span>Compartilhar no WhatsApp</span>
            </button>

            <button class="btn-gerar" style="background-color: var(--keypad-bg); margin-top: 10px; padding: 15px; font-size: 1rem;" onclick="closeModal('modal-qr')">Fechar</button>
        </div>
    </div>

    <script>
        // Lógica mantida conforme versão permanente v5
        let valorCents = 0;
        let config = { nome: "", chave: "", cidade: "SAO PAULO", mensagem: "" };
        let currentPayload = "";

        function carregarConfig() {
            const salvo = localStorage.getItem('tc_pix_app_final_v2');
            if(salvo) {
                config = JSON.parse(salvo);
                if(config.nome) {
                    document.getElementById('main-nome').innerText = config.nome;
                    document.getElementById('in-nome').value = config.nome;
                    document.getElementById('in-chave').value = config.chave;
                    document.getElementById('in-msg').value = config.mensagem || "";
                }
            }
        }

        function salvarConfig() {
            const nome = document.getElementById('in-nome').value.toUpperCase().trim();
            const chave = document.getElementById('in-chave').value.trim();
            const msg = document.getElementById('in-msg').value.trim();

            if(!nome || !chave) return alert("Preencha Nome e Chave!");

            config.nome = nome;
            config.chave = chave;
            config.mensagem = msg;

            localStorage.setItem('tc_pix_app_final_v2', JSON.stringify(config));
            
            document.getElementById('main-nome').innerText = nome;
            closeModal('modal-config');
        }

        function addNum(n) {
            if (valorCents.toString().length < 9) {
                valorCents = parseInt(valorCents.toString() + n);
                updateDisplay();
            }
        }

        function delNum() {
            valorCents = Math.floor(valorCents / 10) || 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').innerText = (valorCents/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function crc16(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                crc ^= str.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021;
                    else crc <<= 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function gerarTudo() {
            if(!config.chave) return openModal('modal-config');
            if(valorCents === 0) return alert("Digite um valor");
            
            const valStr = (valorCents / 100).toFixed(2);
            const f = (id, t) => id + t.length.toString().padStart(2, '0') + t;
            
            let payload = "00020126" + (22 + config.chave.length).toString().padStart(2, '0');
            payload += "0014br.gov.bcb.pix" + f("01", config.chave);
            payload += "520400005303986" + f("54", valStr) + "5802BR";
            payload += f("59", config.nome.substring(0, 25)) + f("60", config.cidade) + "62070503***6304";
            payload += crc16(payload);

            currentPayload = payload;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: payload, width: 200, height: 200 });
            
            document.getElementById('pix-link').innerText = payload;
            document.getElementById('qr-val').innerText = "R$ " + valStr.replace('.', ',');
            openModal('modal-qr');
        }

        function compartilharZap() {
            const valorFormatado = document.getElementById('qr-val').innerText;
            const msgPersonalizada = config.mensagem || "Agradeço pela preferência! ✅";
            const textoCompleto = `Olá! Segue o código PIX para o pagamento de ${valorFormatado}.\n\nCopia e Cola:\n${currentPayload}\n\n${msgPersonalizada}`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(textoCompleto)}`, '_blank');
        }
    </script>
</body>
</html>
