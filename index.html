<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TC PIX">
    <link rel="apple-touch-icon" href="https://i.ibb.co/Ps7xfqnD/TC.png">

    <title>TC QR-Codes | Gerador PIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --primary-green: #238636;
            --primary-green-light: #3fb950;
            --text-color: #e6edf3;
            --text-muted: #8b949e;
            --keypad-bg: #21262d;
            --overlay-bg: rgba(0, 0, 0, 0.98);
        }

        html, body {
            height: 100dvh; width: 100vw; margin: 0; padding: 0;
            overflow: hidden; touch-action: none;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            position: fixed;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .main-container {
            width: 100%; max-width: 450px; height: 100dvh; margin: 0 auto;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: max(10px, env(safe-area-inset-top)) 20px max(15px, env(safe-area-inset-bottom)) 20px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; height: 40px; flex-shrink: 0; }
        .logo { color: var(--primary-green-light); font-weight: bold; font-size: clamp(1rem, 4vw, 1.1rem); }

        .header-section { text-align: center; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; min-height: 20vh; }
        .recebedor-badge { background-color: var(--primary-green); padding: 8px 20px; border-radius: 25px; font-size: 0.85rem; display: inline-block; font-weight: 600; margin-top: 5px; }
        .valor-display { font-size: clamp(2.2rem, 10vw, 3.5rem); font-weight: bold; margin: 10px 0; line-height: 1; }

        .teclado {
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, minmax(0, 1fr));
            gap: clamp(6px, 1.8vh, 12px); flex-grow: 1; min-height: 0; margin-bottom: 15px;
        }

        .tecla {
            background-color: var(--keypad-bg); border: none; color: white;
            font-size: clamp(1.2rem, 5vh, 1.8rem); border-radius: 16px;
            display: flex; justify-content: center; align-items: center;
        }
        .tecla:active { background-color: #30363d; transform: scale(0.95); }

        .btn-gerar {
            background-color: var(--primary-green); color: white; border: none;
            width: 100%; padding: clamp(12px, 2.5vh, 20px); border-radius: 18px;
            font-size: clamp(1rem, 4vw, 1.1rem); font-weight: bold; flex-shrink: 0;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: var(--overlay-bg); flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(10px); padding: 15px;
        }

        /* CARD DO MODAL AMPLIADO */
        .modal-card {
            background: var(--card-bg); width: 95%; max-width: 400px;
            padding: 15px; border-radius: 30px; text-align: center; border: 1px solid #30363d;
        }

        /* QR CODE GIGANTE */
        #qrcode canvas, #qrcode img { 
            margin: 0 auto; 
            border: 12px solid white; 
            border-radius: 15px; 
            width: 100% !important; 
            max-width: 280px; /* Quase encostando nas laterais do card */
            height: auto !important; 
        }

        .pix-code-display {
            background: #0d1117; padding: 10px; font-size: 0.6rem; word-break: break-all;
            border-radius: 10px; border: 1px solid #30363d; color: var(--text-muted);
            margin: 10px 0; max-height: 45px; overflow-y: auto;
        }

        .footer-modal-actions {
            display: flex; align-items: center; gap: 10px; width: 100%; margin-top: 10px;
        }

        .btn-confirmar {
            flex-grow: 1; background-color: var(--primary-green);
            color: white; border: none; padding: 18px; border-radius: 15px;
            font-size: 0.95rem; font-weight: bold;
        }

        .share-circle {
            width: 55px; height: 55px; background-color: #25d366;
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; flex-shrink: 0; transition: transform 0.1s;
        }
        .share-circle:active { transform: scale(0.9); opacity: 0.8; }
        .share-circle svg { width: 24px; height: 24px; fill: white; }

        input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 15px; border-radius: 12px; margin: 8px 0; font-size: 16px; outline: none; }
        
        /* Notificação de Sucesso Original */
        .success-checkmark { width: 80px; height: 80px; margin: 0 auto 20px; }
        .checkmark__circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke-miterlimit: 10; stroke: var(--primary-green-light); fill: none; animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards; }
        .checkmark { width: 80px; height: 80px; border-radius: 50%; display: block; stroke-width: 2; stroke: #fff; stroke-miterlimit: 10; box-shadow: inset 0px 0px 0px var(--primary-green-light); animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both; }
        .checkmark__check { transform-origin: 50% 50%; stroke-dasharray: 48; stroke-dashoffset: 48; animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards; }

        @keyframes stroke { 100% { stroke-dashoffset: 0; } }
        @keyframes scale { 0%, 100% { transform: none; } 50% { transform: scale3d(1.1, 1.1, 1); } }
        @keyframes fill { 100% { box-shadow: inset 0px 0px 0px 40px var(--primary-green-light); } }
    </style>
</head>
<body onload="carregarConfig()">

    <div class="main-container">
        <div class="top-bar">
            <div class="logo">🟢 TC PIX</div>
            <div style="font-size: 1.2rem; cursor: pointer;" onclick="openModal('modal-config')">⚙️</div>
        </div>

        <div class="header-section">
            <div style="color: var(--text-muted); font-size: 0.65rem; letter-spacing: 2px; font-weight: bold; margin-bottom: 5px;">RECEBEDOR</div>
            <div class="recebedor-badge" id="main-nome" onclick="openModal('modal-config')">Configurar Chave</div>
            <div class="valor-display" id="display">R$ 0,00</div>
        </div>

        <div class="teclado">
            <button class="tecla" onclick="addNum(1)">1</button>
            <button class="tecla" onclick="addNum(2)">2</button>
            <button class="tecla" onclick="addNum(3)">3</button>
            <button class="tecla" onclick="addNum(4)">4</button>
            <button class="tecla" onclick="addNum(5)">5</button>
            <button class="tecla" onclick="addNum(6)">6</button>
            <button class="tecla" onclick="addNum(7)">7</button>
            <button class="tecla" onclick="addNum(8)">8</button>
            <button class="tecla" onclick="addNum(9)">9</button>
            <button class="tecla" style="background:transparent;"></button>
            <button class="tecla" onclick="addNum(0)">0</button>
            <button class="tecla" onclick="delNum()" style="color: #f85149">⌫</button>
        </div>

        <button class="btn-gerar" onclick="gerarTudo()">Gerar QR Code PIX</button>
    </div>

    <div class="modal" id="modal-config">
        <div class="modal-card">
            <h3>Configurar Dados</h3>
            <input type="text" id="in-nome" placeholder="Nome Completo">
            <input type="text" id="in-chave" placeholder="Chave PIX">
            <button class="btn-gerar" onclick="salvarConfig()">Salvar Dados</button>
            <p onclick="closeModal('modal-config')" style="cursor:pointer; color:var(--text-muted); margin-top:15px;">Voltar</p>
        </div>
    </div>

    <div class="modal" id="modal-qr">
        <div class="modal-card">
            <div id="qrcode"></div>
            <div style="font-size: 1.3rem; font-weight:bold; color:var(--primary-green-light); margin: 10px 0;" id="qr-val"></div>
            <div class="pix-code-display" id="pix-raw-text"></div>
            
            <div class="footer-modal-actions">
                <button class="btn-confirmar" onclick="confirmar()">Confirmar Pix</button>
                <div class="share-circle" onclick="compartilharPix()">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"></path></svg>
                </div>
            </div>

            <p onclick="closeModal('modal-qr')" style="cursor:pointer; color:var(--text-muted); margin-top:15px; font-size: 0.9rem;">Cancelar</p>
        </div>
    </div>

    <div class="modal" id="modal-sucesso" onclick="reset()">
        <div class="modal-card" style="background: transparent; border: none;">
            <svg class="checkmark success-checkmark" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
            <h2 style="margin: 0; color: white;">Pix Recebido!</h2>
            <p style="color: var(--text-muted); margin-top: 10px;">Toque para continuar</p>
        </div>
    </div>

    <script>
        let valorCents = 0;
        let config = { nome: "", chave: "", cidade: "SAO PAULO" };
        let currentPayload = "";

        function carregarConfig() {
            const salvo = localStorage.getItem('tc_pix_v3');
            if(salvo) {
                config = JSON.parse(salvo);
                if(config.nome) {
                    document.getElementById('main-nome').innerText = config.nome;
                    document.getElementById('in-nome').value = config.nome;
                    document.getElementById('in-chave').value = config.chave;
                }
            }
        }

        function salvarConfig() {
            const nome = document.getElementById('in-nome').value.toUpperCase().trim();
            const chave = document.getElementById('in-chave').value.trim();
            if(!nome || !chave) return alert("Preencha os dados!");
            config.nome = nome; config.chave = chave;
            localStorage.setItem('tc_pix_v3', JSON.stringify(config));
            document.getElementById('main-nome').innerText = nome;
            closeModal('modal-config');
        }

        function addNum(n) { if (valorCents.toString().length < 9) { valorCents = parseInt(valorCents.toString() + n); updateDisplay(); } }
        function delNum() { valorCents = Math.floor(valorCents / 10) || 0; updateDisplay(); }
        function updateDisplay() { document.getElementById('display').innerText = (valorCents/100).toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function crc16(str) {
            let crc = 0xFFFF;
            for (let i = 0; i < str.length; i++) {
                crc ^= str.charCodeAt(i) << 8;
                for (let j = 0; j < 8; j++) {
                    if ((crc & 0x8000) !== 0) crc = (crc << 1) ^ 0x1021;
                    else crc <<= 1;
                }
            }
            return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        }

        function gerarTudo() {
            if(!config.chave) return openModal('modal-config');
            if(valorCents === 0) return alert("Digite um valor");
            const valStr = (valorCents / 100).toFixed(2);
            const f = (id, t) => id + t.length.toString().padStart(2, '0') + t;
            let payload = "00020126" + (22 + config.chave.length).toString().padStart(2, '0');
            payload += "0014br.gov.bcb.pix" + f("01", config.chave);
            payload += "520400005303986" + f("54", valStr) + "5802BR";
            payload += f("59", config.nome.substring(0, 25)) + f("60", config.cidade) + "62070503***6304";
            payload += crc16(payload);
            currentPayload = payload;
            document.getElementById('pix-raw-text').innerText = payload;
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = "";
            // Resolução aumentada para 400x400 para não pixelar ao expandir na tela
            new QRCode(qrContainer, { text: payload, width: 400, height: 400 });
            document.getElementById('qr-val').innerText = "R$ " + valStr.replace('.', ',');
            openModal('modal-qr');
        }

        function compartilharPix() {
            if (navigator.share) {
                navigator.share({ title: 'Pix Copia e Cola', text: currentPayload }).catch(console.error);
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(currentPayload)}`, '_blank');
            }
        }

        function confirmar() { closeModal('modal-qr'); openModal('modal-sucesso'); }
        function reset() { valorCents = 0; updateDisplay(); closeModal('modal-sucesso'); }
    </script>
</body>
</html>
